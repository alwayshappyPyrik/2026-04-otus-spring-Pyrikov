spring:

  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

  datasource:
    url: jdbc:h2:mem:maindb

  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mvc:
    hidden method:
      filter:
        enabled: true